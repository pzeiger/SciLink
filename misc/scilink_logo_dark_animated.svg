<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="800" height="750">
  <defs>
    <!-- Gradients for 3D effect on circles -->
    <radialGradient id="blueGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7BB8F9"/>
      <stop offset="50%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#2E6BC9"/>
    </radialGradient>
    <radialGradient id="orangeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF9A7A"/>
      <stop offset="50%" stop-color="#F06A45"/>
      <stop offset="100%" stop-color="#D94E2A"/>
    </radialGradient>
    <radialGradient id="greenGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#5EEAA0"/>
      <stop offset="50%" stop-color="#34C77B"/>
      <stop offset="100%" stop-color="#22A55E"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#F8F9FA"/>
      <stop offset="100%" stop-color="#E2E4E8"/>
    </radialGradient>
    
    <!-- Glow filters -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#4A90E2" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orangeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#F06A45" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#34C77B" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="centerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    
    <!-- Animated glow filters for dots -->
    <filter id="blueDotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#4A90E2" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="orangeDotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F06A45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenDotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#34C77B" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3A4556"/>
      <stop offset="100%" stop-color="#252D38"/>
    </radialGradient>
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="800" height="750" fill="#252D38"/>
  <rect width="800" height="750" fill="url(#bgGrad)" opacity="0.5"/>
  
  <!-- Dashed triangular connector path (all coords +100) -->
  <path d="M 400 180 
           C 550 180, 680 400, 616.5 555
           C 580 640, 500 690, 400 690
           C 300 690, 220 640, 183.5 555
           C 120 400, 250 180, 400 180"
        fill="none" 
        stroke="#4A5568" 
        stroke-width="2" 
        stroke-dasharray="12,10"
        opacity="0.7"/>
  
  <!-- Connection lines from center circle edge to outer circles -->
  <line x1="400" y1="315" x2="400" y2="248" stroke="#6B7A8C" stroke-width="2" opacity="0.5"/>
  <line x1="300.4" y1="487.5" x2="242.4" y2="521" stroke="#6B7A8C" stroke-width="2" opacity="0.5"/>
  <line x1="499.6" y1="487.5" x2="557.6" y2="521" stroke="#6B7A8C" stroke-width="2" opacity="0.5"/>
  
  <!-- Center circle with shadow -->
  <circle cx="400" cy="430" r="115" fill="url(#centerGrad)" filter="url(#centerShadow)"/>
  
  <!-- Subtle inner ring on center circle -->
  <circle cx="400" cy="430" r="102" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Flow paths: each dot travels from one node → center circle → next node -->
  <!-- 
    Node positions:
    - Blue (top): (400, 180)
    - Orange (bottom-left): (183.5, 555)  
    - Green (bottom-right): (616.5, 555)
    
    Center circle edge points (radius 115, center at 400,430):
    - Top: (400, 315)
    - Bottom-left: (300.4, 487.5)
    - Bottom-right: (499.6, 487.5)
  -->
  
  <!-- Path: Blue node → center circle (arc) → Orange node -->
  <path id="pathBlueToOrange" d="M 400,248 
                                  L 400,315 
                                  A 115,115 0 0,0 300.4,487.5 
                                  L 242.4,521
                                  L 183.5,555" fill="none" stroke="none"/>
  
  <!-- Path: Orange node → center circle (arc) → Green node -->
  <path id="pathOrangeToGreen" d="M 183.5,555 
                                   L 242.4,521
                                   L 300.4,487.5 
                                   A 115,115 0 0,0 499.6,487.5 
                                   L 557.6,521
                                   L 616.5,555" fill="none" stroke="none"/>
  
  <!-- Path: Green node → center circle (arc) → Blue node -->
  <path id="pathGreenToBlue" d="M 616.5,555 
                                 L 557.6,521
                                 L 499.6,487.5 
                                 A 115,115 0 0,0 400,315 
                                 L 400,248
                                 L 400,180" fill="none" stroke="none"/>
  
  <!-- Blue dot - flows from Blue node → Orange node -->
  <g filter="url(#blueDotGlow)" opacity="0.65">
    <circle r="5" fill="#4A90E2">
      <animateMotion dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.7 1">
        <mpath href="#pathBlueToOrange"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Orange dot - flows from Orange node → Green node -->
  <g filter="url(#orangeDotGlow)" opacity="0.65">
    <circle r="5" fill="#F06A45">
      <animateMotion dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.7 1">
        <mpath href="#pathOrangeToGreen"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- Green dot - flows from Green node → Blue node -->
  <g filter="url(#greenDotGlow)" opacity="0.65">
    <circle r="5" fill="#34C77B">
      <animateMotion dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.7 1">
        <mpath href="#pathGreenToBlue"/>
      </animateMotion>
    </circle>
  </g>
  
  <!-- SciLink text with subtle shadow -->
  <text x="400" y="418" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="64" font-weight="700" fill="#1E3A5F" opacity="0.1" transform="translate(1,2)">Sci</text>
  <text x="400" y="418" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="64" font-weight="700" fill="#1E3A5F">Sci</text>
  
  <text x="400" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="64" font-weight="700" opacity="0.1" transform="translate(1,2)">
    <tspan fill="#2B5A9E">L</tspan><tspan fill="#C96A2B">i</tspan><tspan fill="#C9A227">n</tspan><tspan fill="#2D6E46">k</tspan>
  </text>
  <text x="400" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="64" font-weight="700">
    <tspan fill="#2B5A9E">L</tspan><tspan fill="#C96A2B">i</tspan><tspan fill="#C9A227">n</tspan><tspan fill="#2D6E46">k</tspan>
  </text>
  
  <!-- Blue circle (top) - Theta -->
  <circle cx="400" cy="180" r="68" fill="url(#blueGrad)" filter="url(#blueGlow)"/>
  <!-- Theta symbol - larger -->
  <ellipse cx="400" cy="180" rx="20" ry="32" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="380" y1="180" x2="420" y2="180" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  
  <!-- Orange circle (bottom-left) - Wave -->
  <circle cx="183.5" cy="555" r="68" fill="url(#orangeGrad)" filter="url(#orangeGlow)"/>
  <!-- Wave icon - larger -->
  <path d="M 140 567 
           Q 152 530, 164 560 
           Q 176 590, 188 545
           Q 200 500, 212 545
           Q 221 575, 227 557" 
        fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Green circle (bottom-right) - Document -->
  <circle cx="616.5" cy="555" r="68" fill="url(#greenGrad)" filter="url(#greenGlow)"/>
  <!-- Document/text icon - larger -->
  <rect x="584" y="522" width="65" height="66" rx="10" fill="white"/>
  <line x1="597" y1="544" x2="636" y2="544" stroke="#2DB86A" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="597" y1="564" x2="628" y2="564" stroke="#2DB86A" stroke-width="5.5" stroke-linecap="round"/>
</svg>
